<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Survivor / Total Drama Simulator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Survivor / Total Drama / Disventure Camp Simulator</h1>
  </header>

  <main>
    <section id="cast-section">
      <h2>Cast</h2>
      <div id="cast-showcase" class="grid"></div>
    </section>

    <section id="controls">
      <button id="start-season">Start Season</button>
      <button id="next-episode" disabled>Next Episode</button>
    </section>

    <section id="episode-section">
      <h2>Episode</h2>
      <div id="episode-output"></div>
    </section>

    <section id="track-section">
      <h2>Track Records</h2>
      <div id="track-output"></div>
    </section>
  </main>

  <script src="script/data.js"></script>
  <script src="script/engine.js"></script>
  <script src="script/ui.js"></script>
</body>
</html>
